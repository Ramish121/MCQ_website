<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Exam - Ramish Portal</title>
    <!-- Tailwind CSS for fast NTA styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans text-slate-800 h-screen flex flex-col overflow-hidden select-none">

    <!-- TOP HEADER -->
    <header class="bg-blue-700 text-white px-6 py-3 flex justify-between items-center shadow-md z-10">
        <div class="font-black text-xl tracking-wider">RAMISH CBT PORTAL</div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-semibold text-blue-200">Time Left:</span>
            <div id="timer" class="text-2xl font-mono bg-black text-green-400 px-4 py-1 rounded-md border border-gray-700 shadow-inner">
                --:--:--
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- LEFT SIDE: QUESTION AREA (75%) -->
        <main class="w-full md:w-3/4 flex flex-col bg-white border-r border-gray-300">
            
            <!-- Subject and Marking Scheme Bar -->
            <div class="flex justify-between items-center border-b border-gray-200 p-3 bg-slate-50 text-sm font-bold">
                <div class="text-slate-600">Subject: <span id="subject-name" class="text-blue-700 uppercase">Loading...</span></div>
                <div class="bg-white px-3 py-1 rounded-full border border-gray-200 shadow-sm">
                    Marks: <span class="text-green-600">+5</span> for correct, <span class="text-red-500">-1</span> for incorrect
                </div>
            </div>

            <!-- Question & Options Display -->
            <div class="flex-1 p-6 md:p-8 overflow-y-auto">
                
                <div class="mb-6 pb-2 border-b border-gray-100">
                    <span class="font-black text-xl text-slate-800">Question Number : <span id="current-q-no" class="text-blue-600">1</span></span>
                </div>
                
                <!-- Question Text -->
                <div id="question-text" class="text-lg mb-8 text-slate-700 font-medium leading-relaxed">
                    <!-- Dynamic Question Will Load Here -->
                    Loading question from GitHub...
                </div>
                
                <!-- Options Container -->
                <div id="options-container" class="space-y-4">
                    <!-- Options will be generated by JS -->
                </div>

            </div>

            <!-- BOTTOM ACTION BAR (Buttons) -->
            <div class="bg-slate-100 p-4 border-t border-gray-300 flex flex-wrap justify-between items-center gap-3 shadow-inner">
                
                <div class="flex gap-3">
                    <button id="btn-save-next" class="bg-green-600 text-white px-6 py-2.5 rounded shadow-sm hover:bg-green-700 font-bold text-sm transition-colors uppercase">
                        Save & Next
                    </button>
                    <button id="btn-clear" class="bg-white border border-gray-300 text-slate-700 px-6 py-2.5 rounded shadow-sm hover:bg-gray-50 font-bold text-sm transition-colors uppercase">
                        Clear Response
                    </button>
                </div>
                
                <div class="flex gap-3">
                    <button id="btn-save-review" class="bg-orange-500 text-white px-6 py-2.5 rounded shadow-sm hover:bg-orange-600 font-bold text-sm transition-colors uppercase">
                        Save & Mark for Review
                    </button>
                    <button id="btn-mark-review" class="bg-purple-600 text-white px-6 py-2.5 rounded shadow-sm hover:bg-purple-700 font-bold text-sm transition-colors uppercase">
                        Mark for Review & Next
                    </button>
                </div>

            </div>
        </main>

        <!-- RIGHT SIDE: PALETTE AREA (25%) -->
        <aside class="w-full md:w-1/4 bg-slate-50 flex flex-col shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-0">
            
            <!-- Candidate Profile Info -->
            <div class="p-4 border-b border-gray-200 flex items-center gap-4 bg-white">
                <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl font-bold shadow-sm">
                    👤
                </div>
                <div>
                    <div class="font-black text-slate-800 uppercase">Candidate</div>
                    <div class="text-xs font-bold text-slate-500">Ramish Portal User</div>
                </div>
            </div>

            <!-- Status Color Legend -->
            <div class="grid grid-cols-2 gap-3 p-4 text-[11px] font-bold text-slate-600 border-b border-gray-200 bg-white">
                <div class="flex items-center gap-2">
                    <span class="w-6 h-6 bg-gray-100 border border-gray-300 rounded shadow-sm flex items-center justify-center">0</span> Not Visited
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-6 h-6 bg-red-500 text-white rounded shadow-sm flex items-center justify-center" style="border-bottom-right-radius: 12px;">0</span> Not Answered
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-6 h-6 bg-green-500 text-white rounded shadow-sm flex items-center justify-center" style="border-bottom-right-radius: 12px;">0</span> Answered
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-6 h-6 bg-purple-600 text-white rounded shadow-sm flex items-center justify-center">0</span> Marked for Review
                </div>
            </div>

            <!-- Number Palette Grid -->
            <div class="p-4 flex-1 overflow-y-auto custom-scroll bg-slate-50">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="font-black text-sm text-slate-700 uppercase">Question Palette</h3>
                </div>
                <!-- Numbers will be populated via JS -->
                <div id="question-palette" class="grid grid-cols-4 gap-2.5">
                    <!-- Placeholder UI to show how it will look -->
                    <button class="w-10 h-10 bg-red-500 text-white font-bold rounded shadow-sm flex items-center justify-center" style="border-bottom-right-radius: 12px;">1</button>
                    <button class="w-10 h-10 bg-green-500 text-white font-bold rounded shadow-sm flex items-center justify-center" style="border-bottom-right-radius: 12px;">2</button>
                    <button class="w-10 h-10 bg-gray-100 border border-gray-300 text-slate-700 font-bold rounded shadow-sm flex items-center justify-center">3</button>
                    <button class="w-10 h-10 bg-purple-600 text-white font-bold rounded shadow-sm flex items-center justify-center">4</button>
                </div>
            </div>

            <!-- Submit Test Button -->
            <div class="p-4 border-t border-gray-200 bg-white">
                <button id="btn-submit-test" class="w-full bg-blue-700 text-white font-black py-3 rounded-md shadow-md hover:bg-blue-800 transition-colors uppercase tracking-widest">
                    Submit Test
                </button>
            </div>
            
        </aside>
    </div>

    <!-- Naya script file jisme exam engine ka logic hoga -->
    <script src="test-engine.js"></script>
</body>
</html>
